<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog – mischer.net</title>
  <style>
    body {
      background-color: #d4d0c8;
      font-family: "Times New Roman", Times, serif;
      font-size: 15px;
      color: #000000;
      margin: 0;
      padding: 20px;
    }

    a             { color: #0000cc; }
    a:visited     { color: #551a8b; }
    a:hover       { color: #cc0000; }

    #page {
      max-width: 1200px;
      margin: 0 auto;
      background: #ffffff;
      border: 2px solid #808080;
    }

    /* ── HEADER ── */
    #header {
      background: #000080;
      color: #ffffff;
      padding: 14px 18px 10px;
      text-align: center;
      border-bottom: 3px solid #ffff00;
    }

    #header h1 {
      font-family: "Courier New", Courier, monospace;
      font-size: 26px;
      margin: 0 0 4px;
      letter-spacing: 2px;
    }

    #header p {
      font-size: 11px;
      color: #aaaaee;
      margin: 0;
    }

    /* ── NAVIGATION ── */
    #nav {
      background: #c0c0c0;
      padding: 5px 18px;
      font-size: 12px;
      border-bottom: 2px solid #808080;
    }

    #nav a {
      margin-right: 12px;
      text-decoration: none;
      font-weight: bold;
      color: #000080;
    }

    #nav a:hover { text-decoration: underline; }

    /* ── CONTENT ── */
    #content {
      padding: 18px 20px;
    }

    /* ── EINZELNER BEITRAG ── */
    .post {
      margin-bottom: 6px;
    }

    .post h2 {
      font-size: 17px;
      color: #000080;
      margin: 0 0 2px;
      border-bottom: 1px dotted #999999;
      padding-bottom: 3px;
    }

    .post .meta {
      font-size: 11px;
      color: #666666;
      font-style: italic;
      margin: 0 0 8px;
    }

    .post p {
      margin: 0 0 8px;
      line-height: 1.65;
    }

    hr {
      border: none;
      border-top: 1px solid #aaaaaa;
      margin: 18px 0;
    }

    /* ── FOOTER ── */
    #footer {
      background: #c0c0c0;
      border-top: 2px solid #808080;
      padding: 6px 18px;
      font-size: 11px;
      color: #333333;
      text-align: center;
    }
  </style>
</head>
<body>

<div id="page">

  <!-- ═══════════ HEADER ═══════════ -->
  <div id="header">
    <h1>Blog</h1>
    <p></p>
  </div>

  <!-- ═══════════ NAVIGATION ═══════════ -->
  <div id="nav">
    <a href="index.html">&#171; Home</a>
  </div>

  <!-- ═══════════ BEITRÄGE ═══════════ -->
  <div id="content">


    <!-- ════════════════════════════════════════════════════════════
         SO FÜGST DU EINEN NEUEN BEITRAG HINZU:

         1. Kopiere den Block zwischen den gestrichelten Linien.
         2. Füge ihn HIER direkt unter dieser Erklärung ein
            (neuster Beitrag immer ganz oben!).
         3. Ersetze Titel, Datum und Text. Fertig.
         ════════════════════════════════════════════════════════════

    - - - VORLAGE (kopieren und einfügen) - - - - - - - - - - - - -

    <div class="post">
      <h2>DEIN TITEL HIER</h2>
      <p class="meta">Tag. Monat Jahr</p>
      <p>Dein Text hier. Du kannst so viele &lt;p&gt;-Blöcke schreiben wie du willst.</p>
      <p>Ein zweiter Absatz sieht so aus.</p>
    </div>
    <hr>

    - - - ENDE VORLAGE - - - - - - - - - - - - - - - - - - - - - - -->


    <!-- BEITRAG 1 -->
    <div class="post">
      <h2>Beginnings</h2>
      <p class="meta">19. April 2026</p>
      <p>
        I need to write more.
      </p>
      <p>
        Thus, hello world.
      </p>
    </div>
    <hr>


    <!-- Ältere Beiträge weiter unten ... -->


  </div>
  <!-- Ende #content -->

  <!-- ═══════════ FOOTER ═══════════ -->
  <div id="footer">
    &copy; 2026 K. Mischer &nbsp;&mdash;&nbsp; <a href="index.html">mischer.net</a>
  </div>

</div>

</body>
</html>
