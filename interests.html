<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interests – Kris Mischer</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;600;700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:  #1b4332;
      --green-mid:   #2c6e49;
      --green-light: #40916c;
      --green-pale:  #d8f3dc;
      --green-mist:  #f0faf3;
      --text-dark:   #1a1a1a;
      --text-mid:    #3d3d3d;
      --text-light:  #6b6b6b;
      --white:       #ffffff;
    }

    html, body {
      font-family: 'Barlow', sans-serif;
      color: var(--text-dark);
      background: var(--white);
      min-height: 100vh;
    }

    a { color: var(--green-mid); text-decoration: none; }
    a:hover { color: var(--green-dark); text-decoration: underline; }

    /* ── NAV ─────────────────────────────────────────────────── */
    #navbar {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      z-index: 200;
      background: var(--green-dark);
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 40px;
    }

    .nav-brand {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18pt;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none !important;
    }

    .nav-links {
      margin-left: auto;
      display: flex;
      gap: 4px;
    }

    .nav-links a {
      font-size: 9.5pt;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--green-pale);
      padding: 7px 16px;
      border-radius: 2px;
      transition: background 0.15s, color 0.15s;
      text-decoration: none !important;
    }

    .nav-links a:hover, .nav-links a.active {
      background: rgba(255,255,255,0.15);
      color: var(--white);
    }

    /* ── HERO ────────────────────────────────────────────────── */
    #hero {
      margin-top: 56px;
      min-height: 240px;
      background: var(--green-dark);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      padding: 0 60px 44px;
    }

    .geo-block {
      position: absolute;
      right: 0; top: 0;
      width: 340px;
      height: 100%;
      pointer-events: none;
    }

    .geo-block .b1 {
      position: absolute;
      top: 0; right: 0;
      width: 300px; height: 160px;
      background: var(--green-mid);
      clip-path: polygon(100% 0, 100% 100%, 0 0);
    }

    .geo-block .b2 {
      position: absolute;
      bottom: 0; right: 0;
      width: 180px; height: 100px;
      background: var(--green-light);
      opacity: 0.35;
      clip-path: polygon(100% 0, 100% 100%, 0 100%);
    }

    .geo-block .b3 {
      position: absolute;
      top: 18px; right: 38px;
      width: 100px; height: 100px;
      border: 3px solid rgba(255,255,255,0.12);
      transform: rotate(15deg);
    }

    #hero-content {
      position: relative;
      z-index: 2;
    }

    #hero h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 52pt;
      font-weight: 900;
      line-height: 0.9;
      color: var(--white);
      text-transform: uppercase;
      letter-spacing: -1px;
    }

    #hero h1 span {
      display: block;
      color: var(--green-pale);
      font-weight: 300;
      font-size: 24pt;
      letter-spacing: 5px;
      text-transform: uppercase;
      font-family: 'Barlow', sans-serif;
      margin-top: 6px;
    }

    /* ── GREEN STRIPE ─────────────────────────────────────────── */
    .stripe {
      height: 7px;
      background: linear-gradient(90deg, var(--green-mid) 0%, var(--green-light) 60%, var(--green-pale) 100%);
    }

    /* ── MAIN CONTENT ─────────────────────────────────────────── */
    #main {
      max-width: 900px;
      margin: 0 auto;
      padding: 80px 60px 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .bird-wrap {
      width: 100%;
      max-width: 640px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(27,67,50,0.18);
    }

    .bird-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── FOOTER ─────────────────────────────────────────────────── */
    footer {
      background: var(--green-dark);
      padding: 18px 60px;
      display: flex;
      align-items: center;
    }

    footer span {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10pt;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    /* ── ACCENT BARS ─────────────────────────────────────────────── */
    #accent-left {
      position: fixed;
      left: 0;
      top: 56px;
      width: 10px;
      height: calc(100vh - 56px);
      pointer-events: none;
      z-index: 1;
      display: flex;
      flex-direction: column;
    }

    #accent-left .bar { flex: 1; }
    #accent-left .bar:nth-child(1) { background: var(--green-dark);  opacity: 0.85; }
    #accent-left .bar:nth-child(2) { background: var(--green-mid);   opacity: 0.65; }
    #accent-left .bar:nth-child(3) { background: var(--green-light); opacity: 0.45; }
    #accent-left .bar:nth-child(4) { background: var(--green-pale);  opacity: 0.55; }
    #accent-left .bar:nth-child(5) { background: var(--green-light); opacity: 0.3;  }

    /* ── LANGUAGE SWITCHER ──────────────────────────────────────── */
    .lang-switcher {
      position: relative;
      margin-left: 10px;
    }

    .lang-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      cursor: pointer;
      font-size: 18px;
      padding: 4px 8px;
      border-radius: 2px;
      line-height: 1.3;
      display: flex;
      align-items: center;
      transition: background 0.15s;
    }

    .lang-btn:hover { background: rgba(255,255,255,0.18); }

    .lang-dropdown {
      display: none;
      position: absolute;
      right: 0;
      top: 100%;
      padding-top: 6px;
      background: transparent;
      z-index: 300;
    }

    .lang-dropdown-inner {
      background: var(--green-dark);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 2px;
      min-width: 130px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    .lang-switcher:hover .lang-dropdown,
    .lang-switcher:focus-within .lang-dropdown { display: block; }

    .lang-dropdown a {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      color: var(--green-pale) !important;
      font-size: 9.5pt;
      font-weight: 600;
      letter-spacing: 0.5px;
      white-space: nowrap;
      text-decoration: none !important;
    }

    .lang-dropdown a:hover {
      background: rgba(255,255,255,0.1);
      color: var(--white) !important;
    }

    /* ── RESPONSIVE ──────────────────────────────────────────────── */
    @media (max-width: 700px) {
      #hero { padding: 0 28px 32px; }
      #hero h1 { font-size: 36pt; }
      #main { padding: 48px 28px 72px; }
    }
  </style>
</head>
<body>

  <div id="accent-left" aria-hidden="true">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>

  <nav id="navbar">
    <a class="nav-brand" href="index.html">mischer.net</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="cv.html">Curriculum Vitae</a>
      <a href="https://survivalguide.4lima.de" target="_blank" rel="noopener">Student Guide</a>
      <a href="interests.html" class="active">Interests</a>
    </div>
    <div class="lang-switcher">
      <div class="lang-btn" tabindex="0" role="button" aria-label="Language">🇬🇧</div>
      <div class="lang-dropdown"><div class="lang-dropdown-inner">
        <a href="index_german.html">🇩🇪 Deutsch</a>
        <a href="index_spanish.html">🇪🇸 Español</a>
        <a href="index_french.html">🇫🇷 Français</a>
        <a href="index_portuguese.html">🇵🇹 Português</a>
      </div></div>
    </div>
  </nav>

  <section id="hero">
    <div class="geo-block">
      <div class="b1"></div>
      <div class="b2"></div>
      <div class="b3"></div>
    </div>
    <div id="hero-content">
      <h1>
        Interests
        <span>Kris Mischer</span>
      </h1>
    </div>
  </section>

  <div class="stripe"></div>

  <div id="main">
    <div class="bird-wrap">
      <img src="bird.jpg" alt="Under construction!">
    </div>
  </div>

  <footer>
    <span>mischer.net</span>
    <span style="margin-left:auto; font-size:8pt;">© 2026 Kristoph Mischer</span>
  </footer>

</body>
</html>
