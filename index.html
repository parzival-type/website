<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kris Mischer</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Base ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Lato, sans-serif;
      font-size: 11pt;
      font-weight: 400;
      line-height: 1.6667;
      color: #212121;
      background: #fff;
    }

    a {
      color: #a1004e;
      text-decoration: underline;
    }
    a:hover { color: #c62969; }
    a:visited { color: #a1004e; }

    /* ── Fixed Navigation Bar ───────────────────────────────────── */
    #navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 100;
      background: #212121;
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 24px;
    }

    #navbar .site-title a {
      font-family: Lato, sans-serif;
      font-size: 15pt;
      font-weight: 300;
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.3px;
    }
    #navbar .site-title a:hover { color: #fff; }

    /* ── Page Offset below navbar ───────────────────────────────── */
    #page-content {
      margin-top: 56px;
    }

    /* ── Hero / Name Section ────────────────────────────────────── */
    #hero {
      padding: 60px 48px 32px;
      background: #fff;
    }

    #hero h1 {
      font-family: Lato, sans-serif;
      font-size: 45pt;
      font-weight: 300;
      line-height: 1.1;
      color: #7f1146;
      letter-spacing: 0.5px;
    }

    @media (max-width: 479px)  { #hero h1 { font-size: 30pt; } }
    @media (min-width: 480px) and (max-width: 767px) { #hero h1 { font-size: 38pt; } }

    /* ── Main Two-Column Section ────────────────────────────────── */
    #intro {
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      padding: 32px 48px 64px;
      max-width: 1280px;
    }

    #intro .photo-column {
      flex: 0 0 260px;
      max-width: 300px;
    }

    #intro .photo-column img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }

    /* Placeholder box shown when no image is present */
    #intro .photo-column .photo-placeholder {
      width: 100%;
      aspect-ratio: 3/4;
      background: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      font-size: 10pt;
      text-align: center;
      border: 2px dashed #ccc;
    }

    #intro .text-column {
      flex: 1 1 320px;
    }

    #intro .text-column p {
      margin-top: 12px;
      font-size: 11pt;
      line-height: 1.6667;
      color: #212121;
    }

    #intro .text-column p:first-child { margin-top: 0; }

    /* ── Footer ─────────────────────────────────────────────────── */
    #footer {
      padding: 20px 48px;
      background: #f2f2f2;
      font-size: 9pt;
      color: #555;
      border-top: 1px solid #ddd;
    }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 767px) {
      #hero  { padding: 40px 24px 24px; }
      #intro { padding: 24px 24px 48px; flex-direction: column; }
      #intro .photo-column { flex: none; max-width: 100%; }
    }
  </style>
</head>
<body>

  <!-- ── Navigation Bar ───────────────────────────────────────── -->
  <nav id="navbar">
    <div class="site-title">
      <a href="#">Kris Mischer</a>
    </div>
  </nav>

  <div id="page-content">

    <!-- ── Hero: Name ─────────────────────────────────────────── -->
    <section id="hero">
      <h1>Kris Mischer</h1>
    </section>

    <!-- ── Intro: Photo + Bio ─────────────────────────────────── -->
    <section id="intro">
      <div class="photo-column">
        <img src="kmischer_photo.jpg" alt="Kris Mischer">
      </div>

      <div class="text-column">
        <p>
          Du kannst mich unter <a href="mailto:kristoph.mischer@uni-bielefeld.de">kristoph.mischer(at)uni-bielefeld(dot)de</a> erreichen.
          Meinen Lebenslauf findest du <a href="kmischer_CV.pdf">hier</a>.
        </p>
      </div>
    </section>

    <!-- ── Footer ──────────────────────────────────────────────── -->
    <footer id="footer">
      <span>mischer.net</span>
    </footer>

  </div><!-- /page-content -->

</body>
</html>
